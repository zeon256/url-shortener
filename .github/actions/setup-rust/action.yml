name: "Setup Rust Environment"
description: "Sets up Rust toolchain with caching"

inputs:
  toolchain:
    description: "Rust toolchain version"
    required: false
    default: "stable"
  components:
    description: "Rust components to install (comma-separated)"
    required: false
    default: "clippy,rustfmt"
  cache-key:
    description: "Additional cache key"
    required: false
    default: ""
  workspaces:
    description: "Cargo workspaces and target directories for rust-cache"
    required: false
    default: ". -> target"
  working-directory:
    description: "Directory containing the Rust crate"
    required: false
    default: "."
  install-mold:
    description: "Whether to install mold as the default linker"
    required: false
    default: "false"
  mold-version:
    description: "mold version to install"
    required: false
    default: "2.41.0"
  install-dylint:
    description: "Whether to install cargo-dylint and dylint-link"
    required: false
    default: "false"
  dylint-components:
    description: "Rust components to install for Dylint toolchains (comma-separated)"
    required: false
    default: ""
  additional-targets:
    description: "Additional Rust targets to install (space- or comma-separated)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}

    - name: Add Rust targets
      if: ${{ inputs.additional-targets != '' }}
      shell: bash
      run: rustup target add ${{ inputs.additional-targets }}

    - name: Setup Mold linker
      if: ${{ inputs.install-mold == 'true' }}
      uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      with:
        mold-version: ${{ inputs.mold-version }}
        make-default: true

    - name: Install cargo-dylint and dylint-link
      if: ${{ inputs.install-dylint == 'true' || inputs.dylint-components != '' }}
      shell: bash
      run: |
        cargo install cargo-dylint
        cargo install dylint-link

    - name: Cache Cargo dependencies
      uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        key: ${{ inputs.cache-key }}
        workspaces: ${{ inputs.workspaces }}

    - name: Install Dylint toolchain components
      if: ${{ inputs.dylint-components != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        components="${{ inputs.dylint-components }}"
        components="${components//,/ }"

        cargo dylint list | while read -r _ toolchain _; do
          if [ -n "${toolchain:-}" ]; then
            rustup component add --toolchain "$toolchain" $components
          fi
        done
