name: Quality Checks

on:
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/actions/setup-rust/**"
      - ".github/workflows/qc.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/api

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
      - name: Format Check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::pedantic -D clippy::perf

  dylint:
    name: Dylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          dylint-components: rustfmt
      - name: Dylint
        run: cargo dylint --all

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
      - name: Test
        run: cargo test
