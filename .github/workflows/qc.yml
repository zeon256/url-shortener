name: Quality Checks

on:
  pull_request:
    paths:
      - ".github/actions/setup-rust/**"
      - ".github/workflows/qc.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "apps/shortener_api/**"

concurrency:
  group: qc-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/shortener_api

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
      - name: Format Check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          install-mold: "true"
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::pedantic -D clippy::perf

  dylint:
    name: Dylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          install-mold: "true"
          install-dylint: "true"
          dylint-components: rustfmt
      - name: Dylint
        run: cargo dylint --all

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -p 5432 -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          install-mold: "true"
      - name: Test
        run: cargo test
