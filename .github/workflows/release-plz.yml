name: Release-plz

on:
  push:
    branches:
      - main
    paths:
      - "apps/shortener_api/**"
      - ".github/actions/setup-rust/**"
      - ".github/workflows/release-plz.yml"
  workflow_dispatch:

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Run release-plz release
        uses: release-plz/action@49c995b2442b0f60dd4aab07a164cc00643471fc # v0.5.128
        with:
          command: release
          manifest_path: apps/shortener_api/Cargo.toml
          version: "0.3.157"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Run release-plz PR
        uses: release-plz/action@49c995b2442b0f60dd4aab07a164cc00643471fc # v0.5.128
        with:
          command: release-pr
          manifest_path: apps/shortener_api/Cargo.toml
          version: "0.3.157"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
